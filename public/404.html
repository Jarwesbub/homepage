<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // redirect all unknown paths to index.html so React Router can handle them.
      window.location.href = "/index.html" + window.location.pathname;
    </script>
  </head>
  <body></body>
</html>
